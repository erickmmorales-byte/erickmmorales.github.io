title: "Your Best Friend"
description: "Notes on things that matter"
author: "Erick Morales"
url: "https://erickmmorales.com"
baseurl: ""

# Footer text
footer_text: "© 2026 &nbsp;&middot;&nbsp; Written slowly, published when ready"

# Permalink structure for posts
permalink: /posts/:title/

# Build settings
markdown: kramdown
highlighter: rouge

# Pagination — 12 posts per page, older posts on later pages
paginate: 12
paginate_path: "/page:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Exclude non-site files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.gemspec"
  - vendor/
