---
layout: default
---
<div class="page is-active">
  <header class="site-header">
    <h1 class="site-title">{{ site.title }}</h1>
    <p class="site-subtitle">{{ site.description }}</p>
  </header>

  <div class="timeline-wrap">
    <main class="timeline">

      {% for post in site.posts %}
      <article class="post post--{% cycle 'left', 'right' %}"
               aria-expanded="false"
               data-post-url="{{ post.url | relative_url }}"
               data-title="{{ post.title | escape }}"
               data-excerpt="{{ post.excerpt | strip_html | escape }}">
        <div class="post__connector"></div>
        <div class="post__card" tabindex="0" role="button" aria-label="{{ post.title | escape }}">
          <header class="post__header">
            <time class="post__date" datetime="{{ post.date | date: '%Y-%m-%d' }}">
              {{ post.date | date: "%B %-d, %Y" }}
            </time>
            <h2 class="post__title">{{ post.title }}</h2>
          </header>
          <p class="post__excerpt">{{ post.excerpt | strip_html }}</p>
          <div class="post__body" aria-hidden="true">
            <div class="post__body-inner">
              {{ post.content }}
            </div>
          </div>
          <button class="post__toggle" aria-label="Read more about {{ post.title | escape }}">Read more</button>
        </div>
      </article>
      {% endfor %}

    </main>
  </div>

  <footer class="site-footer">
    <p>{{ site.footer_text }}</p>
  </footer>
</div>
